<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STARBRIDGE — Comms</title>
  <link rel="stylesheet" href="/client/shared/theme.css" />
  <link rel="stylesheet" href="/client/shared/accessibility.css" />
  <link rel="stylesheet" href="/client/comms/comms.css" />
</head>
<body>
  <div class="station-container" id="station-container">
    <header class="station-header">
      <span class="station-label">COMMS</span>
      <span class="callsign-display" id="callsign-display">—</span>
      <span class="status-dot" id="conn-status" data-status="disconnected"></span>
    </header>

    <main class="comms-main">

      <!-- ── Left column: Signal queue + Active dialogue ───────────────────── -->
      <section class="comms-left">

        <!-- Signal queue header -->
        <div class="signal-queue-header">
          <span class="label-sm">SIGNAL QUEUE</span>
          <span class="signal-count" id="signal-count">0</span>
          <span class="bandwidth-indicator" id="bandwidth-indicator">BW 100%</span>
        </div>

        <!-- Signal cards list -->
        <div class="signal-queue" id="signal-queue">
          <p class="queue-empty label-sm c-dim">No signals detected.</p>
        </div>

        <!-- Active dialogue / decode panel -->
        <div class="dialogue-panel" id="dialogue-panel" style="display:none">
          <div class="dialogue-header">
            <span class="label-sm" id="dialogue-source">—</span>
            <button class="btn btn--sm" id="dialogue-close" aria-label="Close dialogue">CLOSE</button>
          </div>
          <div class="decode-bar-wrap" id="decode-bar-wrap" style="display:none">
            <div class="label-sm">DECODING</div>
            <div class="gauge"><div class="gauge__fill" id="decode-fill" style="width:0%"></div></div>
            <span class="decode-pct" id="decode-pct">0%</span>
          </div>
          <div class="dialogue-content" id="dialogue-content"></div>
          <div class="response-options" id="response-options"></div>
          <div class="dialogue-actions" id="dialogue-actions"></div>
        </div>

      </section>

      <!-- ── Right column: Spectrum + Channels + Factions + Hailing ────────── -->
      <aside class="comms-right">

        <!-- Frequency spectrum / scanner -->
        <section class="panel-section panel-section--scanner">
          <div class="section-header">
            <span class="label-sm">FREQUENCY SCANNER</span>
            <span class="freq-readout" id="freq-readout">0.150</span>
            <span class="faction-badge" id="faction-badge">—</span>
          </div>
          <div class="canvas-wrap">
            <canvas id="scanner-canvas" aria-label="Frequency spectrum scanner"></canvas>
          </div>
          <div class="freq-control">
            <label class="label-sm" for="freq-slider">TUNE</label>
            <input type="range" id="freq-slider" min="0" max="1000" value="150" step="1" aria-label="Frequency tuner" />
          </div>
        </section>

        <!-- Channel management -->
        <section class="panel-section panel-section--channels">
          <div class="section-header">
            <span class="label-sm">CHANNELS</span>
          </div>
          <div class="channel-grid" id="channel-grid"></div>
        </section>

        <!-- Faction standing -->
        <section class="panel-section panel-section--factions">
          <div class="section-header">
            <span class="label-sm">FACTION STANDING</span>
          </div>
          <div class="faction-list" id="faction-list"></div>
        </section>

        <!-- Hailing controls -->
        <section class="panel-section panel-section--hail">
          <div class="section-header">
            <span class="label-sm">HAILING</span>
            <span class="hail-status" id="hail-status">NO CONTACT</span>
          </div>
          <div class="hail-panel" id="hail-panel">
            <p class="hail-hint">Tune to a faction frequency to hail.</p>
          </div>
          <div class="hail-controls" id="hail-controls" style="display:none">
            <input type="text" id="contact-id-input" value="unknown_vessel" class="contact-input" placeholder="Contact ID" aria-label="Contact ID" />
            <div class="hail-btn-row">
              <button class="btn btn--sm btn--primary" data-hail="identify">IDENTIFY</button>
              <button class="btn btn--sm btn--primary" data-hail="negotiate">NEGOTIATE</button>
              <button class="btn btn--sm btn--warn" data-hail="warning">WARNING</button>
              <button class="btn btn--sm btn--danger" data-hail="demand">DEMAND</button>
            </div>
          </div>
        </section>

        <!-- Creature communication -->
        <section class="panel-section panel-section--creatures" id="creature-section" style="display:none">
          <div class="section-header">
            <span class="label-sm">CREATURE COMMUNICATION</span>
            <span class="label-sm c-dim" id="creature-comm-count">0</span>
          </div>
          <div id="creature-comm-list"></div>
        </section>

        <!-- Assist panel -->
        <div class="assist-panel" id="assist-panel" style="display:none">
          <span class="label-sm">ASSIST AVAILABLE</span>
          <p id="assist-instructions"></p>
        </div>

      </aside>
    </main>
  </div>

  <!-- Puzzle overlay injected here by puzzle_renderer.js -->
  <div id="puzzle-overlay-mount"></div>

  <script type="module" src="/client/comms/comms.js"></script>
  <script type="module" src="/client/shared/a11y_widget.js"></script>
</body>
</html>
