<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STARBRIDGE — SECURITY</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="../shared/accessibility.css">
  <link rel="stylesheet" href="security.css">
</head>
<body>
  <div class="station-container">

    <!-- ── Header ─────────────────────────────────────────────────────── -->
    <header class="station-header panel">
      <div class="panel__header station-header__bar">
        <span class="text-title">SECURITY</span>
        <span class="text-label" id="mission-label" style="opacity:0.5">—</span>
        <div class="station-header__status">
          <span class="status-dot status-dot--disconnected" data-status-dot></span>
          <span class="text-label" data-status-label>CONNECTING</span>
        </div>
      </div>
    </header>

    <!-- ── Standby ─────────────────────────────────────────────────────── -->
    <main class="station-main" data-standby>
      <div class="station-standby">
        <p class="text-header">SECURITY STATION</p>
        <p class="text-body">Awaiting mission orders.</p>
        <a class="text-label station-lobby-link" href="/client/lobby/">← RETURN TO LOBBY</a>
      </div>
    </main>

    <!-- ── Active security layout ──────────────────────────────────────── -->
    <div class="security-main" data-security-main style="display:none">

      <!-- ── Left: Ship interior + controls ──────────────────────────── -->
      <div class="left-panel">

        <!-- Deck tabs + canvas -->
        <div class="canvas-panel panel">
          <div class="panel__header canvas-panel__header">
            <span class="text-label">SHIP INTERIOR</span>
            <span class="text-data text-dim" id="boarding-status">STANDBY</span>
            <div class="deck-tabs" id="deck-tabs">
              <button class="deck-tab deck-tab--active" data-deck="0">ALL</button>
            </div>
          </div>
          <div class="canvas-wrap">
            <canvas id="ship-canvas"></canvas>
          </div>
        </div>

        <!-- Controls bar -->
        <div class="controls-bar panel">
          <div class="controls-row">
            <button class="ctrl-btn" id="btn-lock" title="Lock selected room door (L)">LOCK</button>
            <button class="ctrl-btn" id="btn-unlock" title="Unlock selected room door (U)">UNLOCK</button>
            <select class="ctrl-select" id="sel-lockdown" title="Lockdown options (D)">
              <option value="">LOCKDOWN ▼</option>
              <option value="deck">LOCKDOWN DECK</option>
              <option value="ship">LOCKDOWN SHIP</option>
              <option value="lift_deck">LIFT DECK</option>
              <option value="lift_all">LIFT ALL</option>
            </select>
            <select class="ctrl-select" id="sel-bulkhead" title="Seal bulkhead between decks">
              <option value="">BULKHEAD ▼</option>
            </select>
            <select class="ctrl-select" id="sel-arm" title="Arm crew on deck (A)">
              <option value="">ARM CREW ▼</option>
            </select>
            <select class="ctrl-select" id="sel-quarantine" title="Quarantine room (Q)">
              <option value="">QUARANTINE ▼</option>
            </select>
            <select class="ctrl-select" id="sel-alert" title="Set deck alert level">
              <option value="">SET ALERT ▼</option>
            </select>
          </div>
        </div>
      </div>

      <!-- ── Right: Intel sidebar ─────────────────────────────────────── -->
      <div class="sidebar panel">

        <!-- Alert status per deck -->
        <div class="sidebar-section sidebar-section--alerts">
          <div class="panel__header"><span class="text-label">ALERT STATUS</span></div>
          <div id="alert-list" class="alert-list"></div>
        </div>

        <!-- Marine squads -->
        <div class="sidebar-section sidebar-section--squads">
          <div class="panel__header"><span class="text-label">MARINE SQUADS</span></div>
          <div id="team-list" class="team-list"></div>
        </div>

        <!-- Boarding intel -->
        <div class="sidebar-section sidebar-section--intel">
          <div class="panel__header"><span class="text-label">BOARDING INTEL</span></div>
          <div id="boarding-list" class="boarding-list"></div>
        </div>

        <!-- Escort requests -->
        <div class="sidebar-section sidebar-section--escorts">
          <div class="panel__header"><span class="text-label">ESCORT REQUESTS</span></div>
          <div id="escort-list" class="escort-list">
            <p class="text-dim text-label">—</p>
          </div>
        </div>

        <!-- Incident log -->
        <div class="sidebar-section sidebar-section--incidents">
          <div class="panel__header"><span class="text-label">INCIDENT LOG</span></div>
          <div id="incident-log" class="incident-log">
            <p class="text-dim text-label">No incidents reported.</p>
          </div>
        </div>

      </div>

    </div>

    <!-- ── Bottom status bar ──────────────────────────────────────────── -->
    <div class="status-bar" id="status-bar" data-security-main style="display:none">
      <span class="text-label" id="sb-boarding">BOARDING: NONE</span>
      <span class="text-label" id="sb-squads">SQUADS: 0/0</span>
      <span class="text-label" id="sb-doors">DOORS: 0 LOCKED</span>
      <span class="text-label" id="sb-armoury">ARMOURY: 100%</span>
      <span class="text-label" id="sb-sensors">SENSORS: 100%</span>
    </div>

  </div>
  <script type="module" src="security.js"></script>
  <script type="module" src="../shared/a11y_widget.js"></script>
</body>
</html>
