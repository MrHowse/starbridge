<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STARBRIDGE — FLIGHT OPERATIONS</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="../shared/accessibility.css">
  <link rel="stylesheet" href="flight_ops.css">
</head>
<body>
  <div class="station-container">

    <!-- ─── Header bar ──────────────────────────────────────────────────── -->
    <header class="station-header panel">
      <div class="panel__header station-header__bar">
        <span class="text-title">FLIGHT OPS</span>
        <div class="station-header__center">
          <span class="text-label" id="mission-label">STANDING BY</span>
        </div>
        <div class="station-header__status">
          <span class="status-dot status-dot--disconnected" data-status-dot></span>
          <span class="text-label" data-status-label>CONNECTING</span>
        </div>
      </div>
    </header>

    <!-- ─── Standby overlay ─────────────────────────────────────────────── -->
    <div class="fo-standby" data-standby>
      <p class="text-header">STANDING BY</p>
      <p class="text-body">Awaiting mission orders from the Captain.</p>
      <a class="text-label fo-standby__lobby-link" href="/client/lobby/">← RETURN TO LOBBY</a>
    </div>

    <!-- ─── Main layout ─────────────────────────────────────────────────── -->
    <main class="fo-main" data-fo-main style="display:none">

      <!-- Left: tactical map -->
      <section class="fo-map-panel panel" id="fo-map-panel" aria-label="Tactical map">
        <div class="panel__header">
          <span class="text-header">TACTICAL MAP</span>
          <span class="fo-map-label text-dim" id="fo-map-coord"></span>
        </div>

        <div class="fo-legend">
          <div class="fo-legend-item"><div class="fo-legend-dot" style="background:var(--primary)"></div><span>Ship</span></div>
          <div class="fo-legend-item"><div class="fo-legend-dot" style="background:#ffcc00"></div><span>Scout</span></div>
          <div class="fo-legend-item"><div class="fo-legend-dot" style="background:#ff4040"></div><span>Combat</span></div>
          <div class="fo-legend-item"><div class="fo-legend-dot" style="background:#00cc66"></div><span>Rescue</span></div>
          <div class="fo-legend-item"><div class="fo-legend-dot" style="background:#4fc3f7"></div><span>Survey</span></div>
          <div class="fo-legend-item"><div class="fo-legend-dot" style="background:#cc66ff"></div><span>ECM</span></div>
          <div class="fo-legend-item"><div class="fo-legend-dot" style="background:#ffb000"></div><span>Buoy</span></div>
          <div class="fo-legend-item"><div class="fo-legend-dot" style="background:#ff3333"></div><span>Hostile</span></div>
          <div class="fo-legend-item"><div class="fo-legend-dot" style="background:#ffaa00"></div><span>Neutral</span></div>
        </div>

        <div id="range-bar" class="range-bar"></div>
        <div class="fo-map-canvas-wrap" id="fo-canvas-wrap">
          <canvas id="fo-map"></canvas>
          <div class="fo-target-hint" id="fo-target-hint" style="display:none"></div>
          <div class="fo-mode-indicator" id="fo-mode-indicator" style="display:none"></div>
        </div>
      </section>

      <!-- Right: drone status cards -->
      <aside class="fo-controls panel" aria-label="Flight operations controls">
        <div class="panel__header">
          <span class="text-header">DRONES</span>
        </div>

        <div class="fo-controls-scroll">
          <!-- Active drone cards injected here -->
          <div id="fo-drone-cards"></div>

          <!-- Hangar section -->
          <div class="fo-hangar-section">
            <div class="panel__header fo-section-header">
              <span class="text-label">HANGAR</span>
            </div>
            <div id="fo-hangar-cards"></div>
          </div>

          <!-- Expendables -->
          <div class="fo-expendables-section">
            <div class="panel__header fo-section-header">
              <span class="text-label">EXPENDABLES</span>
              <span class="text-data text-dim" id="fo-decoy-stock">DECOYS: 0</span>
            </div>
            <div class="fo-expendables-row">
              <button class="fo-btn" id="fo-deploy-decoy-btn">Deploy Decoy</button>
            </div>
            <div id="fo-buoy-list"></div>
          </div>
        </div>
      </aside>

      <!-- Ship-class-specific panels (hidden by default) -->
      <div id="squadron-panel" class="panel fo-class-panel" style="display:none">
        <div class="panel-header"><span>SQUADRON CONTROL</span></div>
        <div class="panel-body" id="squadron-content">
          <span class="text-dim">Squadron coordination loading...</span>
        </div>
      </div>
      <div id="carrier-panel" class="panel fo-class-panel" style="display:none"></div>

    </main>

    <!-- ─── Bottom status bar ──────────────────────────────────────────── -->
    <footer class="fo-status-bar panel" data-fo-status style="display:none">
      <div class="fo-status-bar__inner" id="fo-status-bar"></div>
    </footer>

  </div>
  <script type="module" src="flight_ops.js"></script>
  <script type="module" src="../shared/a11y_widget.js"></script>
</body>
</html>
