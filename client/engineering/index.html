<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STARBRIDGE — ENGINEERING</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="engineering.css">
</head>
<body>
  <div class="station-container">

    <!-- ─── Header bar ──────────────────────────────────────────────────── -->
    <header class="station-header panel">
      <div class="panel__header station-header__bar">
        <span class="text-title">ENGINEERING</span>
        <div class="station-header__center">
          <span class="text-label" id="mission-label">STANDING BY</span>
        </div>
        <div class="station-header__status">
          <span class="status-dot status-dot--disconnected" data-status-dot></span>
          <span class="text-label" data-status-label>CONNECTING</span>
        </div>
      </div>
    </header>

    <!-- ─── Standby overlay (visible until game.started) ───────────────── -->
    <div class="eng-standby" data-standby>
      <p class="text-header">STANDING BY</p>
      <p class="text-body">Awaiting mission orders from the Captain.</p>
      <a class="text-label eng-standby__lobby-link" href="/client/lobby/">← RETURN TO LOBBY</a>
    </div>

    <!-- ─── Main engineering layout (hidden until game.started) ─────────── -->
    <main class="eng-main" data-eng-main style="display:none">

      <!-- Left: ship schematic diagnostic display -->
      <section class="eng-schematic panel" aria-label="Ship systems schematic">
        <div class="panel__header">
          <span class="text-header">SHIP SYSTEMS — ENGINEERING DIAGNOSTIC</span>
          <span class="text-label" id="repair-status-label">NO REPAIR ACTIVE</span>
        </div>
        <div class="eng-schematic__canvas-wrap">
          <canvas id="schematic"></canvas>
        </div>
      </section>

      <!-- Right: power allocation + system controls -->
      <aside class="eng-controls panel" aria-label="Power allocation">

        <div class="panel__header">
          <span class="text-header">POWER ALLOCATION</span>
        </div>

        <!-- Power budget indicator -->
        <div class="eng-budget">
          <div class="eng-budget__row">
            <span class="text-label">POWER BUDGET</span>
            <span class="text-data" id="budget-readout">000 / 700</span>
          </div>
          <div class="gauge eng-budget__gauge">
            <div class="gauge__fill" id="budget-gauge-fill" style="width:0%; background:var(--primary)"></div>
          </div>
        </div>

        <!-- System rows — populated by engineering.js at game start -->
        <div class="eng-systems" id="systems-container"></div>

        <!-- Damage Control panel — populated by engineering.dc_state broadcasts -->
        <div class="eng-dc-section">
          <div class="panel__header">
            <span class="text-label">DAMAGE CONTROL</span>
            <span class="text-data text-dim" id="dc-status">ALL CLEAR</span>
          </div>
          <div id="dc-room-list" class="dc-room-list">
            <p class="text-dim dc-all-clear">All compartments nominal.</p>
          </div>
        </div>

      </aside>

    </main>

  </div>
  <script type="module" src="engineering.js"></script>
</body>
</html>
