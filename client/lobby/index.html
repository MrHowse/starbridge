<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STARBRIDGE — LOBBY</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="../shared/accessibility.css">
  <link rel="stylesheet" href="lobby.css">
</head>
<body>
  <div class="station-container">

    <!-- Header bar -->
    <header class="lobby-header">
      <div class="lobby-header__title">
        <span class="text-title">STARBRIDGE</span>
        <span class="text-label">CREW ASSIGNMENT</span>
      </div>
      <div class="lobby-header__status">
        <span class="status-dot status-dot--disconnected" data-status-dot></span>
        <span class="text-label" data-status-label>CONNECTING</span>
      </div>
    </header>

    <!-- Callsign entry -->
    <section class="lobby-callsign">
      <label class="text-label" for="callsign-input">YOUR CALLSIGN</label>
      <input
        id="callsign-input"
        type="text"
        class="lobby-input"
        maxlength="16"
        placeholder="ENTER CALLSIGN"
        autocomplete="off"
        spellcheck="false"
        data-callsign-input
      >
    </section>

    <!-- Role assignment grid -->
    <section class="lobby-roles">
      <h2 class="text-header lobby-roles__heading">STATION ASSIGNMENTS</h2>
      <div class="lobby-roles__grid" data-roles-grid>
        <!-- Role cards injected by lobby.js -->
      </div>
    </section>

    <!-- Host launch panel -->
    <section class="lobby-launch panel" data-launch-panel>
      <div class="panel__header">
        <span class="text-header">MISSION CONTROL</span>
      </div>
      <div class="lobby-launch__body">
        <span class="text-label" data-launch-status>AWAITING HOST</span>
        <div class="lobby-launch__controls">
          <label class="text-label" for="mission-select">MISSION</label>
          <select id="mission-select" class="lobby-select" data-mission-select>
            <option value="sandbox">SANDBOX</option>
            <option value="first_contact">FIRST CONTACT</option>
            <option value="defend_station">DEFEND THE STATION</option>
            <option value="search_rescue">SEARCH AND RESCUE</option>
            <option value="puzzle_poc">PUZZLE FRAMEWORK PoC</option>
            <option value="engineering_drill">ENGINEERING DRILL</option>
          </select>
          <label class="text-label" for="difficulty-select">DIFFICULTY</label>
          <select id="difficulty-select" class="lobby-select" data-difficulty-select>
            <option value="cadet">CADET — Easy (hints enabled)</option>
            <option value="officer" selected>OFFICER — Normal</option>
            <option value="commander">COMMANDER — Hard</option>
            <option value="admiral">ADMIRAL — Expert</option>
          </select>
          <label class="text-label" for="ship-class-select">SHIP CLASS</label>
          <select id="ship-class-select" class="lobby-select" data-ship-class-select>
            <option value="scout">SCOUT — Light hull, fast (crew 3–4)</option>
            <option value="corvette">CORVETTE — Light patrol (crew 4–6)</option>
            <option value="frigate" selected>FRIGATE — Standard (crew 6–9)</option>
            <option value="cruiser">CRUISER — Heavy warship (crew 8–11)</option>
            <option value="battleship">BATTLESHIP — Capital ship (crew 10–12)</option>
            <option value="medical_ship">HOPE-CLASS — Hospital vessel (crew 5–8)</option>
            <option value="carrier">ATLAS-CLASS — Drone carrier (crew 7–12)</option>
          </select>
          <button class="btn btn--primary lobby-launch__btn" data-launch-btn disabled aria-label="Launch mission">
            LAUNCH
          </button>
        </div>

        <!-- Resume saved game (host-only, populated by lobby.js) -->
        <div id="resume-section" style="display:none">
          <hr style="border-color:rgba(0,255,65,0.2);margin:12px 0">
          <span class="text-label" style="display:block;margin-bottom:6px">RESUME SAVED GAME</span>
          <div class="lobby-launch__controls">
            <select id="save-select" class="lobby-select" data-save-select>
              <option value="">SELECT SAVE…</option>
            </select>
            <button class="btn btn--secondary" id="resume-btn" disabled>RESUME</button>
          </div>
          <span class="text-muted" id="resume-status" style="font-size:.65rem"></span>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="lobby-footer">
      <span class="text-muted" data-session-label></span>
      <div class="lobby-footer__profile" id="footer-profile" style="display:none">
        <span class="text-dim footer-profile-name" id="footer-profile-name"></span>
        <span class="text-dim footer-profile-wins" id="footer-profile-wins"></span>
        <button class="btn btn--ghost footer-profile-lb-btn" id="leaderboard-btn">LEADERBOARD</button>
      </div>
    </footer>

    <!-- Leaderboard modal -->
    <div id="leaderboard-modal" class="lobby-modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="lb-modal-title">
      <div class="lobby-modal-box panel">
        <div class="panel__header">
          <span class="text-header" id="lb-modal-title">LEADERBOARD</span>
          <button id="lb-close" class="btn btn--ghost" aria-label="Close">✕</button>
        </div>
        <div id="lb-content" class="lobby-modal-body">
          <span class="text-dim">Loading…</span>
        </div>
      </div>
    </div>

  </div>
  <script type="module" src="lobby.js"></script>
  <script type="module" src="../shared/a11y_widget.js"></script>
</body>
</html>
