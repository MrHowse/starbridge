<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <g fill="none" stroke="#00ff41" stroke-width="1.5" stroke-linejoin="round">
    <!-- Wide hull with asymmetric flight deck -->
    <polygon points="100,5 70,20 50,35 42,55 45,78 65,92 100,95 135,92 148,78 150,55 145,35 130,20"/>
    <!-- Flight deck (port side - long strip) -->
    <rect x="42" y="35" width="14" height="45" rx="2"/>
    <!-- Hangar openings -->
    <rect x="44" y="40" width="10" height="6"/>
    <rect x="44" y="52" width="10" height="6"/>
    <rect x="44" y="64" width="10" height="6"/>
    <!-- Bridge (offset starboard) -->
    <rect x="105" y="12" width="22" height="14" rx="3"/>
    <!-- Control tower -->
    <line x1="116" y1="12" x2="116" y2="5"/>
    <circle cx="116" cy="4" r="2"/>
    <!-- Engine pods -->
    <rect x="70" y="88" width="12" height="6" rx="2"/>
    <rect x="118" y="88" width="12" height="6" rx="2"/>
    <!-- Catapult tracks -->
    <line x1="48" y1="38" x2="48" y2="30"/>
    <line x1="48" y1="30" x2="55" y2="25"/>
  </g>
</svg>
