<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <g fill="none" stroke="#00ff41" stroke-width="1.5" stroke-linejoin="round">
    <!-- Massive angular hull with armour plates -->
    <polygon points="100,2 70,18 55,35 48,55 50,75 60,90 100,98 140,90 150,75 152,55 145,35 130,18"/>
    <!-- Armour plate lines -->
    <line x1="60" y1="30" x2="140" y2="30"/>
    <line x1="55" y1="50" x2="145" y2="50"/>
    <line x1="55" y1="70" x2="145" y2="70"/>
    <!-- Spinal mount rail (centre line) -->
    <line x1="100" y1="5" x2="100" y2="60" stroke-dasharray="4,3"/>
    <circle cx="100" cy="8" r="3"/>
    <!-- Heavy bridge -->
    <rect x="80" y="15" width="40" height="14" rx="3"/>
    <!-- Heavy weapon turrets -->
    <rect x="48" y="38" width="10" height="8" rx="2"/>
    <rect x="142" y="38" width="10" height="8" rx="2"/>
    <rect x="50" y="58" width="8" height="6" rx="1"/>
    <rect x="142" y="58" width="8" height="6" rx="1"/>
    <!-- Massive engine block -->
    <rect x="68" y="88" width="64" height="8" rx="3"/>
  </g>
</svg>
