<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STARBRIDGE — HAZARD CONTROL</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="../shared/accessibility.css">
  <link rel="stylesheet" href="hazard_control.css">
</head>
<body>
  <div class="station-container">

    <!-- ── Header ─────────────────────────────────────────────────────── -->
    <header class="station-header panel">
      <div class="panel__header station-header__bar">
        <span class="text-title">HAZARD CONTROL</span>
        <span class="text-label" id="mission-label" style="opacity:0.5">—</span>
        <div class="station-header__status">
          <span class="status-dot status-dot--disconnected" data-status-dot></span>
          <span class="text-label" data-status-label>CONNECTING</span>
        </div>
      </div>
    </header>

    <!-- ── Standby ─────────────────────────────────────────────────────── -->
    <main class="station-main" data-standby>
      <div class="station-standby">
        <p class="text-header">HAZARD CONTROL</p>
        <p class="text-body">Awaiting mission orders.</p>
        <a class="text-label station-lobby-link" href="/client/lobby/">← RETURN TO LOBBY</a>
      </div>
    </main>

    <!-- ── Active three-panel layout ───────────────────────────────────── -->
    <div class="hc-main" data-hc-main style="display:none">

      <!-- Left panel: deck status cards -->
      <div class="hc-left panel">
        <div class="panel__header">
          <span class="text-label">DECK STATUS</span>
        </div>
        <div class="hc-deck-list" id="hc-deck-list"></div>
      </div>

      <!-- Centre panel: canvas interior map + overlay selector -->
      <div class="hc-centre">
        <div class="hc-overlay-bar" id="hc-overlay-bar"></div>
        <div class="hc-canvas-wrap">
          <canvas id="hc-canvas"></canvas>
        </div>
      </div>

      <!-- Right panel: actions / hazards / event log -->
      <div class="hc-right panel">
        <div class="panel__header">
          <span class="text-label" id="hc-actions-title">ACTIONS</span>
        </div>
        <div class="hc-right-scroll">
          <div class="hc-actions" id="hc-actions">
            <p class="text-dim">Select a room or connection.</p>
          </div>

          <div class="panel__header hc-sub-header">
            <span class="text-label">ACTIVE HAZARDS</span>
          </div>
          <div class="hc-hazards" id="hc-hazards">
            <p class="text-dim">No active hazards.</p>
          </div>

          <div class="panel__header hc-sub-header">
            <span class="text-label">EVENT LOG</span>
          </div>
          <div class="hc-log" id="hc-log"></div>
        </div>
      </div>

      <!-- Bottom status bar -->
      <div class="hc-bottom" id="hc-bottom">
        <span class="hc-bottom-item" id="hc-suppressant">SUPPRESSANT —</span>
        <span class="hc-bottom-sep">|</span>
        <span class="hc-bottom-item" id="hc-teams">TEAMS 0</span>
        <span class="hc-bottom-sep">|</span>
        <span class="hc-bottom-item" id="hc-forcefields">FORCE FIELDS 0</span>
        <span class="hc-bottom-sep">|</span>
        <span class="hc-bottom-item" id="hc-lifesupport">LIFE SUPPORT —</span>
        <span class="hc-bottom-sep">|</span>
        <span class="hc-bottom-item" id="hc-worstdeck">WORST DECK —</span>
      </div>

    </div>
  </div>
  <script type="module" src="hazard_control.js"></script>
  <script type="module" src="../shared/a11y_widget.js"></script>
</body>
</html>
