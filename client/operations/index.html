<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starbridge — Operations</title>
  <link rel="stylesheet" href="../shared/base.css">
  <link rel="stylesheet" href="../shared/accessibility.css">
  <link rel="stylesheet" href="operations.css">
</head>
<body>
  <!-- Header -->
  <header class="station-header">
    <span class="station-header__title">OPS</span>
    <span class="station-header__mission" data-mission-label>AWAITING ORDERS</span>
    <span class="station-header__status">
      <span data-status-dot class="status-dot"></span>
      <span data-status-label>CONNECTING</span>
    </span>
  </header>

  <!-- Standby overlay -->
  <div class="ops-standby" id="ops-standby">AWAITING MISSION ORDERS</div>

  <!-- Main three-panel layout -->
  <div class="ops-main" id="ops-main" style="display:none">
    <!-- Left: Analysis Panel -->
    <div class="ops-analysis panel" id="ops-analysis">
      <div class="panel__header"><span class="text-header">ANALYSIS</span></div>
      <div id="ops-analysis-content">
        <p class="text-dim">Select a contact to begin assessment.</p>
      </div>
      <div class="panel__header"><span class="text-header">COORDINATION</span></div>
      <div id="ops-coordination-content">
        <p class="text-dim">No active coordination bonuses.</p>
      </div>
    </div>

    <!-- Centre: Tactical Map -->
    <div class="ops-map-container">
      <canvas id="ops-canvas" width="800" height="600" aria-label="Operations tactical map"></canvas>
      <div class="ops-bottom-bar" id="ops-bottom-bar">
        <div id="ops-range-bar" class="range-bar"></div>
        <span id="ops-coord-summary"></span>
        <span id="ops-assessment-queue">ASSESS: 0/0</span>
        <span id="ops-hull-status">HULL —</span>
        <span id="ops-shield-status">SHIELDS —</span>
        <span id="ops-speed-status">SPD —</span>
      </div>
    </div>

    <!-- Right: Feed + Mission Tracker -->
    <div class="ops-feed-panel panel">
      <div class="panel__header"><span class="text-header">INFORMATION FEED</span></div>
      <ul class="ops-feed-list" id="ops-feed-list"></ul>

      <div class="panel__header"><span class="text-header">MISSION TRACKER</span></div>
      <div id="ops-mission-tracker">
        <p class="text-dim">No active missions.</p>
      </div>

      <div class="panel__header"><span class="text-header">STATION ADVISORY</span></div>
      <div class="ops-advisory">
        <input type="text" id="ops-advisory-input" maxlength="80" placeholder="Message (max 80 chars)">
        <select id="ops-advisory-target">
          <option value="">TARGET</option>
          <option value="helm">HELM</option>
          <option value="weapons">WEAPONS</option>
          <option value="engineering">ENGINEERING</option>
          <option value="science">SCIENCE</option>
          <option value="medical">MEDICAL</option>
          <option value="security">SECURITY</option>
          <option value="comms">COMMS</option>
          <option value="flight_ops">FLIGHT OPS</option>
          <option value="electronic_warfare">EW</option>
          <option value="hazard_control">HAZCON</option>
          <option value="captain">CAPTAIN</option>
        </select>
        <button id="ops-advisory-send">SEND</button>
      </div>
    </div>
  </div>

  <script type="module" src="../shared/a11y_widget.js"></script>
  <script type="module" src="operations.js"></script>
</body>
</html>
