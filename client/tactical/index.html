<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STARBRIDGE — TACTICAL OFFICER</title>
  <link rel="stylesheet" href="../shared/theme.css">
  <link rel="stylesheet" href="../shared/accessibility.css">
  <link rel="stylesheet" href="tactical.css">
</head>
<body>
  <div class="station-container">

    <!-- Header bar -->
    <header class="station-header panel">
      <div class="panel__header station-header__bar">
        <span class="text-title">TACTICAL OFFICER</span>
        <div class="station-header__center">
          <span class="text-label" id="mission-label">STANDING BY</span>
        </div>
        <div class="station-header__status">
          <span class="status-dot status-dot--disconnected" data-status-dot></span>
          <span class="text-label" data-status-label>CONNECTING</span>
        </div>
      </div>
    </header>

    <!-- Standby overlay -->
    <div class="tac-standby" data-standby>
      <p class="text-header">STANDING BY</p>
      <p class="text-body">Awaiting mission orders from the Captain.</p>
      <a class="text-label tac-standby__lobby-link" href="/client/lobby/">← RETURN TO LOBBY</a>
    </div>

    <!-- Main tactical layout (hidden until game.started) -->
    <main class="tac-main" data-tac-main style="display:none">

      <!-- Left: tactical plot map -->
      <section class="tac-map panel" aria-label="Tactical plot">
        <div class="panel__header">
          <span class="text-header">TACTICAL PLOT</span>
          <span class="text-label text-dim" id="tac-map-info">NORTH-UP · 50k</span>
        </div>
        <div id="range-bar" class="range-bar"></div>
        <div class="tac-map__canvas-wrap">
          <canvas id="tac-canvas"></canvas>
        </div>
        <div class="tac-map__toolbar">
          <button class="tac-tool-btn" id="btn-add-waypoint" title="Add waypoint (click map)">WPT</button>
          <button class="tac-tool-btn" id="btn-add-note" title="Add note (click map)">NOTE</button>
          <button class="tac-tool-btn tac-tool-btn--cancel" id="btn-cancel-tool">CANCEL</button>
        </div>
      </section>

      <!-- Right: controls panel -->
      <aside class="tac-controls panel" aria-label="Tactical controls">

        <!-- Threat board -->
        <div class="panel__header">
          <span class="text-header">THREAT BOARD</span>
        </div>
        <div class="tac-threat-list" id="threat-list">
          <p class="text-dim">No contacts detected.</p>
        </div>

        <!-- Intercept -->
        <div class="panel__header" style="margin-top:8px">
          <span class="text-label">INTERCEPT PLOT</span>
        </div>
        <div class="tac-intercept-section">
          <div class="tac-status-row">
            <span class="text-label">TARGET</span>
            <span class="text-data" id="intercept-target-label">NONE</span>
          </div>
          <div class="tac-status-row">
            <span class="text-label">BEARING</span>
            <span class="text-data" id="intercept-bearing">—</span>
          </div>
          <div class="tac-status-row">
            <span class="text-label">ETA</span>
            <span class="text-data" id="intercept-eta">—</span>
          </div>
        </div>

        <!-- Annotations -->
        <div class="panel__header" style="margin-top:8px">
          <span class="text-label">ANNOTATIONS</span>
        </div>
        <div class="tac-annotation-list" id="annotation-list">
          <p class="text-dim">No annotations.</p>
        </div>

        <!-- Strike plans -->
        <div class="panel__header" style="margin-top:8px">
          <span class="text-label">STRIKE PLANS</span>
        </div>
        <div class="tac-strike-section" id="strike-section">
          <div class="tac-strike-builder" id="strike-builder">
            <div class="tac-strike-step-row">
              <input class="tac-input" id="step-role" placeholder="Role (e.g. helm)" type="text">
              <input class="tac-input" id="step-action" placeholder="Action" type="text">
              <input class="tac-input tac-input--narrow" id="step-offset" placeholder="T+0" type="number" value="0" step="1">
              <button class="tac-tool-btn" id="btn-add-step">+</button>
            </div>
            <div class="tac-step-list" id="step-list"></div>
            <button class="tac-btn" id="btn-create-plan">CREATE PLAN</button>
          </div>
          <div class="tac-plan-list" id="plan-list"></div>
        </div>

      </aside>
    </main>

  </div>
  <script type="module" src="tactical.js"></script>
  <script type="module" src="../shared/a11y_widget.js"></script>
</body>
</html>
